<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Screening</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .form-card {
      background: white;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 450px;
    }
    .fill-tag {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .fill-tag span {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 0.5rem 2rem;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1.2rem;
      display: inline-block;
    }
    h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #333;
    }
    input {
      width: 100%;
      padding: 0.8rem 1rem;
      margin-bottom: 1rem;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      transition: 0.3s;
    }
    input:focus {
      border-color: #667eea;
      outline: none;
    }
    input[type="file"] {
      padding: 0.5rem;
      background: #f9f9f9;
    }
    button {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="form-card">
    <div class="fill-tag">
      <span>FILL THE FORM</span>
    </div>
    <h2>Resume</h2>
    <form action="/analyze_resume" method="post" enctype="multipart/form-data">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="text" name="phone" placeholder="Phone Number" required>
      <input type="email" name="gmail" placeholder="Email" required>
      <input type="file" name="resume" accept="application/pdf" required>
      <button type="submit">Submit Resume</button>
    </form>
  </div>
</body>
</html>
