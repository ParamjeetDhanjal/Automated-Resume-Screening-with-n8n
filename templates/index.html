<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Screening</title>
  <style>
    /* Reset and Typography */
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      color: #333;
      padding: 50px 20px;
    }

    /* Simple Container */
    .form-card {
      background: #ffffff;
      padding: 20px;
      border: 1px solid #ccc;
      max-width: 400px;
      margin: 0 auto; /* Center the box */
    }

    /* Headers */
    h2 {
      margin-top: 0;
      border-bottom: 2px solid #333;
      padding-bottom: 10px;
    }

    /* Form Elements */
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 15px;
      border: 1px solid #999;
      box-sizing: border-box; /* Ensures padding doesn't affect width */
    }

    /* Basic Button */
    button {
      background-color: #4CAF50; /* Standard Green */
      color: white;
      padding: 10px 15px;
      border: none;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
    }

    button:hover {
      background-color: #45a049;
    }

    /* Removed the 'Fill Tag' styling to keep it minimal */
    .fill-tag {
      font-weight: bold;
      color: #666;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <div class="form-card">
    <div class="fill-tag">PLEASE FILL THE FORM</div>
    <h2>Resume Submission</h2>
    
    <form action="/analyze_resume" method="post" enctype="multipart/form-data">
      <label>Name</label>
      <input type="text" name="name" placeholder="John Doe" required>

      <label>Phone</label>
      <input type="text" name="phone" placeholder="123-456-7890" required>

      <label>Email</label>
      <input type="email" name="gmail" placeholder="example@gmail.com" required>

      <label>Upload PDF</label>
      <input type="file" name="resume" accept="application/pdf" required>

      <button type="submit">Submit Resume</button>
    </form>
  </div>

</body>
</html>
