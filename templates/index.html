<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: #f4f4f4;
  font-family: 'Segoe UI', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}

form {
  background: #ffffff;
  padding: 2.5rem;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
  width: 100%;
  max-width: 440px;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

h2 {
  text-align: center;
  font-size: 1.5rem;
  color: #111;
  margin-bottom: 0.5rem;
}

input[type="text"],
input[type="email"],
input[type="number"],
input[type="file"] {
  width: 100%;
  padding: 0.75rem 1rem;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 0.95rem;
  color: #333;
  background: #fafafa;
  outline: none;
  transition: border-color 0.2s;
}

input:focus {
  border-color: #4f46e5;
  background: #fff;
}

input[type="file"] {
  padding: 0.6rem;
  cursor: pointer;
}

button[type="submit"] {
  padding: 0.85rem;
  background: #4f46e5;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  margin-top: 0.5rem;
}

button[type="submit"]:hover {
  background: #4338ca;
}
  </style>
</head>
<body>
  <form action="/analyze_resume" method="post" enctype="multipart/form-data">

  <input type="text" name="name" placeholder="Your Name" required>
  <input type="text" name="phone" placeholder="Phone Number" required>
  <input type="email" name="gmail" placeholder="Email" required>

  <input type="file" name="resume" accept="application/pdf" required>

  <button type="submit">Submit</button>

</form>
</body>
</html>
